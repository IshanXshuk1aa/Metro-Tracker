<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Tracking App</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
    body {
        background-color: #1a1a2e;
        color: #ffffff;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
    }
    h1 {
        text-align: center;
        letter-spacing: 4px;
        margin-bottom: 10px;
    }
    #map {
        border-radius: 12px;
        border: 2px solid #444;
    }
</style>
</head>
<body>
    <h1>METRO TRACKER</h1>
    <div style="display: flex; gap: 20px; padding: 10px;">
    <span><span style="background: #F5C300; padding: 4px 12px; border-radius: 4px;">&nbsp;</span> Yellow Line</span>
    <span><span style="background: #200EE9; padding: 4px 12px; border-radius: 4px;">&nbsp;</span> Blue Line</span>
    <span><span style="background: #D81313; padding: 4px 12px; border-radius: 4px;">&nbsp;</span> Red Line</span>
</div>
    <div id="map" style="width: 100%; height: 600px;"></div>
    <script>
        const lineColors = {
    1: '#F5C300',
    2: '#200EE9',
    3: '#D81313'
};
    const stationsByLine = {};
    const map = L.map('map').setView([28.6139, 77.2090], 12);

   L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO'
}).addTo(map);
    fetch('http://127.0.0.1:8000/lines/1/stations')
    .then(response => response.json())
    .then(stations => {
        stationsByLine[1] = stations; 
        const coords = stations.map(s => [s.latitude, s.longitude]);
        L.polyline(coords, {color: '#F5C300 '}).addTo(map);
        stations.forEach(s => {
    L.circleMarker([s.latitude, s.longitude], {
        radius: 5,
        color: '#ffffff',
        fillColor: '#ffffff',
        fillOpacity: 1
    }).bindPopup(s.name).addTo(map);
});
    });
    fetch('http://127.0.0.1:8000/lines/2/stations')
    .then(response => response.json())
    .then(stations => {
        stationsByLine[2] = stations; 
        const coords = stations.map(s => [s.latitude, s.longitude]);
        L.polyline(coords, {color: '#200EE9'}).addTo(map);
        stations.forEach(s => {
    L.circleMarker([s.latitude, s.longitude], {
        radius: 5,
        color: '#ffffff',
        fillColor: '#ffffff',
        fillOpacity: 1
    }).bindPopup(s.name).addTo(map);
});
    });
    fetch('http://127.0.0.1:8000/lines/3/stations')
    .then(response => response.json())
    .then(stations => {
        stationsByLine[3] = stations; 
        const coords = stations.map(s => [s.latitude, s.longitude]);
        L.polyline(coords, {color: '#D81313'}).addTo(map);
        stations.forEach(s => {
    L.circleMarker([s.latitude, s.longitude], {
        radius: 5,
        color: '#ffffff',
        fillColor: '#ffffff',
        fillOpacity: 1
    }).bindPopup(s.name).addTo(map);
});
    });
    const trainMarkers = {};

const ws = new WebSocket('ws://127.0.0.1:8000/ws/positions');

ws.onmessage = function(event) {
    const data = JSON.parse(event.data);

    for (const tripId in data) {
        const pos = data[tripId];
        const lineStations = stationsByLine[pos.line_id];
        if (!lineStations) continue;

        const station = lineStations[pos.index];
        if (!station) continue;

        const latlng = [station.latitude, station.longitude];

        if (trainMarkers[tripId]) {
            trainMarkers[tripId].setLatLng(latlng);
            trainMarkers[tripId].setPopupContent(`Train ${tripId} | ${station.name} | ${pos.direction}`);
        } else {
            trainMarkers[tripId] = L.circleMarker(latlng, {
                radius: 8,
                color: '#ffffff',
                fillColor: lineColors[pos.line_id],
                fillOpacity: 1
            }).bindPopup(`Train ${tripId} | ${station.name} | ${pos.direction}`).addTo(map);
        }
    }
};
</script>
</body>
</html>
